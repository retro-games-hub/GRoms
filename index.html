<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png">
  <title>GRoms - Your personal game download library</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">

    <div class="logo">
      <a href="index.html">
        <img src="favicon.png" alt="GRoms Logo" class="logo-img">
        <div class="logo-text">
          <h1>GRoms</h1>
          <span>Game Library</span>
        </div>
      </a>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search games...">
      <div id="searchInput" class="search-results"></div>
    </div>

    <nav class="nav">
      <a href="index.html" class="active">Home</a>
    </nav>

  </div>
</header>

<main class="container layout">

  <section class="main-content">

    <div class="filters">
      <!-- <input id="searchInput" type="text" placeholder="Search games..." /> -->

      <select id="platformFilter">
        <option value="">All Platforms</option>
      </select>

      <select id="categoryFilter">
        <option value="">All Categories</option>
      </select>


      <select id="sortSelect">
        <option value="az">Name A-Z</option>
        <option value="za">Name Z-A</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>
    </div>

    <div id="gamesGrid" class="games-grid"></div>

  </section>

  <aside class="sidebar">

    <div class="widget">
      <h3>Last Added</h3>

      <div id="lastAddedGames"></div>
    </div>

    <div class="widget">
      <h3 id="randomCategoryTitle">
        Random Category
      </h3>

      <div id="randomCategoryGames"></div>
      <button id="newCategoryBtn" class="btn">
        🎲 New Category
      </button>
    </div>

  </aside>

</main>

<footer class="footer">
  <div class="footer-content">
    <p>© 2026 - <span id="year"></span> GRoms</p>
    <p>All Rights Reserved</p>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
    const year = document.getElementById("year");
            if (year) {
                year.textContent = new Date().getFullYear();
            }
</script>
</body>
</html>
